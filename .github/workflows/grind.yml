name: Grind for cubes

on:
  schedule:
    # Every 10 min, off the hour-boundary (:07 not :00) to reduce
    # GitHub Actions runner contention. Top-of-the-hour cron triggers
    # get throttled hardest on shared free runners — actual cadence
    # was 2–5 hours instead of 10 minutes. :7/:17/etc lands during
    # low-contention windows; we'll re-measure cadence in a week.
    - cron: "7,17,27,37,47,57 * * * *"
  workflow_dispatch:
    inputs:
      max_iterations:
        description: "How many inscriptions to walk this run"
        default: "5000"
        required: false

permissions:
  contents: write

# Never overlap. If a previous run is still going, the new scheduled trigger
# waits for it to finish (cancel-in-progress: false). GitHub queues at most
# one pending run per group, so a long-running grind can't pile up backlog.
concurrency:
  group: grind
  cancel-in-progress: false

jobs:
  grind:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Grind
        env:
          MAX_ITERATIONS: ${{ inputs.max_iterations || '5000' }}
        run: npm run grind

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/cubes.json data/cursor.json

          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi

          total=$(node -e "console.log(JSON.parse(require('fs').readFileSync('data/cubes.json','utf8')).length)")
          cursor_num=$(node -e "console.log(JSON.parse(require('fs').readFileSync('data/cursor.json','utf8')).lastScannedNumber)")
          git commit -m "chore: grind run — $total cubes, cursor at #$cursor_num"
          git push
